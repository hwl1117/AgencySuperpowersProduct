version: '3.8'

services:
  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./videobrain.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./downloads:/app/downloads
      - ./audio:/app/audio
      - ./knowledge_base_db:/app/knowledge_base_db
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - videobrain-network

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - videobrain-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - videobrain-network

volumes:
  redis-data:

networks:
  videobrain-network:
    driver: bridge